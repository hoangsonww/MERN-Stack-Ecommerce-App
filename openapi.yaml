openapi: 3.1.0
info:
  title: Fusion E-Commerce Backend APIs
  description: |
    API documentation for the Fusion E-Commerce backend server. This documentation provides detailed information on all available endpoints for managing products, users, authentication, and more.
  version: 1.1.0
  contact:
    email: support@fusion-ecommerce.com
servers:
  - url: https://fusion-electronics-api.vercel.app/
    description: Production server
  - url: https://fusion-electronics-api.vercel.app
    description: Local development server
paths:
  /api/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Bad request
  /api/auth/login:
    post:
      summary: Authenticate a user and return a JWT token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Invalid credentials
  /api/auth/verify-email:
    post:
      summary: Verify if an email exists in the system
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Email verified
        '404':
          description: Email not found
  /api/auth/reset-password:
    post:
      summary: Reset a user's password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Bad request
  /api/checkout/create-order:
    post:
      summary: Create a new order
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                      quantity:
                        type: integer
                totalAmount:
                  type: number
      responses:
        '201':
          description: Order created successfully
        '400':
          description: Bad request
  /api/products:
    get:
      summary: Returns the list of all products
      tags: [Products]
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
  /api/products/{id}:
    get:
      summary: Get a product by id
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
  /api/products/category/{category}:
    get:
      summary: Get products by category
      tags: [Products]
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Products in category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
  /api/products/{id}/rating:
    put:
      summary: Update the product rating
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: number
                  format: float
      responses:
        '200':
          description: Product rating updated successfully
        '400':
          description: Bad request
  /api/search:
    get:
      summary: Search for products
      tags: [Search]
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
  /api/wishlist:
    get:
      summary: Get the current user's wishlist
      tags: [Wishlist]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wishlist with populated product objects
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
        '401':
          description: Unauthorized
    post:
      summary: Add a product to the wishlist
      tags: [Wishlist]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WishlistAddRequest'
      responses:
        '200':
          description: Item added
        '400':
          description: Invalid productId or already in wishlist
        '404':
          description: Product not found
        '401':
          description: Unauthorized
  /api/wishlist/{productId}:
    delete:
      summary: Remove a product from the wishlist
      tags: [Wishlist]
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item removed
        '400':
          description: Invalid productId
        '404':
          description: Item or wishlist not found
        '401':
          description: Unauthorized
  /api/alerts/subscribe:
    post:
      summary: Subscribe to a restock or price-drop alert
      tags: [Alerts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertSubscribeRequest'
      responses:
        '201':
          description: Subscription created or reactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertSubscription'
        '400':
          description: Validation error or duplicate active subscription
        '404':
          description: Product not found
        '401':
          description: Unauthorized
  /api/alerts/cancel:
    post:
      summary: Cancel an active alert subscription
      tags: [Alerts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, type]
              properties:
                productId:
                  type: string
                type:
                  type: string
                  enum: [restock, price_drop]
      responses:
        '200':
          description: Subscription cancelled
        '400':
          description: Invalid input
        '404':
          description: Active subscription not found
        '401':
          description: Unauthorized
  /api/alerts/mine:
    get:
      summary: List all alert subscriptions for the current user
      tags: [Alerts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of subscriptions enriched with product details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertSubscription'
        '401':
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: apiKey
      in: header
      name: x-auth-token
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        rating:
          type: number
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        password:
          type: string
    WishlistAddRequest:
      type: object
      required: [productId]
      properties:
        productId:
          type: string
          description: MongoDB ObjectId of the product to add
    AlertSubscribeRequest:
      type: object
      required: [productId, type]
      properties:
        productId:
          type: string
          description: MongoDB ObjectId of the product
        type:
          type: string
          enum: [restock, price_drop]
          description: Alert type
        targetPrice:
          type: number
          description: (price_drop only) Notify when price falls to or below this value
        dropPercent:
          type: number
          minimum: 1
          maximum: 99
          description: (price_drop only) Notify when price drops by this percentage from subscription-time price
    AlertSubscription:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        productId:
          type: string
        userEmail:
          type: string
        type:
          type: string
          enum: [restock, price_drop]
        targetPrice:
          type: number
          nullable: true
        dropPercent:
          type: number
          nullable: true
        priceAtSubscription:
          type: number
          nullable: true
        status:
          type: string
          enum: [ACTIVE, TRIGGERED, CANCELLED]
        lastTriggeredAt:
          type: string
          format: date-time
          nullable: true
        product:
          $ref: '#/components/schemas/Product'
